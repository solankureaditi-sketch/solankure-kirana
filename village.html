<!DOCTYPE html>
<html>
<head>
  <title>Select Village</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #56ab2f, #a8e063);
      color: white;
    }

    h1 {
      margin-top: 60px;
    }

    select {
      padding: 10px;
      font-size: 16px;
      border-radius: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 25px;
      margin-top: 20px;
      border: none;
      border-radius: 20px;
      background: white;
      color: black;
      cursor: pointer;
    }

    button:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

  <h1 id="title"></h1>

  <select id="village">
    <option value="" id="defaultOption"></option>
    <option value="kognoli">Kognoli</option>
    <option value="hanbarwadi">Hanbarwadi</option>
  </select>

  <br>

  <button onclick="saveVillage()" id="btn"></button>

  <script>
    let lang = localStorage.getItem("lang");

    if(lang === "mr"){
      document.getElementById("title").innerText = "आपले गाव निवडा";
      document.getElementById("defaultOption").innerText = "-- गाव निवडा --";
      document.getElementById("btn").innerText = "पुढे जा";
    }

    else if(lang === "hi"){
      document.getElementById("title").innerText = "अपना गांव चुनें";
      document.getElementById("defaultOption").innerText = "-- गांव चुनें --";
      document.getElementById("btn").innerText = "आगे बढ़ें";
    }

    else {
      document.getElementById("title").innerText = "Select Your Village";
      document.getElementById("defaultOption").innerText = "-- Select Village --";
      document.getElementById("btn").innerText = "Continue";
    }

    function saveVillage(){
      let village = document.getElementById("village").value;

      if(village === ""){
        alert("Please select village");
        return;
      }

      localStorage.setItem("village", village);

      window.location.href = "variety.html";
    }
  </script>

</body>
</html>
